<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>編成メモ</title>
<style>
:root{
  --ink-navy:#161629; --ink-navy-2:#1f2038; --card:#262844; --card-2:#2e3050;
  --lime:#dcff3c; --pink:#ff3f7f; --orange:#ff8a3d; --cyan:#3ce6ff;
  --text:#f2f2f8; --muted:#9a9ac0; --border:#3a3c66;
}
*{box-sizing:border-box;}
body{
  margin:0; background: radial-gradient(circle at 8% 0%, rgba(220,255,60,0.10), transparent 40%), radial-gradient(circle at 95% 10%, rgba(255,63,127,0.12), transparent 45%), var(--ink-navy);
  color:var(--text); font-family:"Hiragino Maru Gothic ProN","Hiragino Sans","Yu Gothic",system-ui,sans-serif; min-height:100vh; padding:20px 14px 60px;
}
/* パスワード画面用のスタイル */
#lockScreen {
  position: fixed; top: 0; left: 0; width: 100%; height: 100%;
  background: var(--ink-navy); z-index: 9999; display: flex; flex-direction: column;
  align-items: center; justify-content: center; padding: 20px;
}
#lockScreen input { max-width: 300px; text-align: center; margin-bottom: 12px; }
#lockScreen button { background: var(--lime); color: var(--ink-navy); }

.wrap{max-width:900px;margin:0 auto;}
header{position:relative;margin-bottom:22px;padding:6px 6px 6px;}
.splat{ position:absolute; top:-10px; left:-8px; width:60px; height:60px; background:var(--lime); clip-path: path('M48 0 C60 4 58 20 72 18 C90 16 96 34 84 42 C96 48 90 66 74 62 C78 78 60 82 50 70 C40 84 20 78 22 62 C6 66 0 48 14 40 C0 32 6 14 22 18 C22 4 38 -4 48 0 Z'); opacity:.55; z-index:0; }
h1{ position:relative; z-index:1; font-size:26px; font-weight:900; letter-spacing:.04em; margin:0; color:var(--ink-navy); background:var(--lime); display:inline-block; padding:6px 16px; border-radius:6px; }
.sub{color:var(--muted); font-size:13px; margin:10px 2px 0; letter-spacing:.02em;}
.panel{ background:var(--card); border:1px solid var(--border); border-radius:16px; padding:16px; margin-bottom:16px; }
.panel h2{ font-size:13px; color:var(--cyan); letter-spacing:.08em; margin:0 0 10px; text-transform:uppercase; font-weight:800; }
.chiprow{display:flex; flex-wrap:wrap; gap:8px;}
.chip{ border:1.5px solid var(--border); background:var(--ink-navy-2); color:var(--text); padding:7px 14px; border-radius:999px; font-size:13.5px; font-weight:700; cursor:pointer; transition:.12s; user-select:none; }
.chip:hover{border-color:var(--cyan);}
.chip.active{ background:var(--lime); color:var(--ink-navy); border-color:var(--lime); box-shadow:0 2px 0 rgba(0,0,0,.25); }
.chip.active.rule-active{background:var(--pink); color:#fff; border-color:var(--pink);}
.grid4{display:grid; grid-template-columns:repeat(2,1fr); gap:10px;}
@media(min-width:560px){.grid4{grid-template-columns:repeat(4,1fr);}}
.slot{display:flex; flex-direction:column; gap:4px;}
.slot label{font-size:11.5px; color:var(--muted); font-weight:800;}
input[type=text], input[type=password]{ background:var(--ink-navy-2); border:1.5px solid var(--border); color:var(--text); border-radius:8px; padding:9px 10px; font-size:14px; width:100%; }
input[type=text]:focus, input[type=password]:focus{outline:none; border-color:var(--cyan);}
.memo{margin-top:12px;}
.row-btns{display:flex; gap:10px; margin-top:16px; align-items:center;}
button{ border:none; border-radius:10px; padding:10px 18px; font-weight:800; font-size:14px; cursor:pointer; transition:.12s; font-family:inherit; }
.btn-save{background:var(--lime); color:var(--ink-navy);}
.btn-save:hover{filter:brightness(1.08);}
.btn-cancel{background:transparent; color:var(--muted); border:1.5px solid var(--border);}
.btn-cancel:hover{color:var(--text);}
.formmsg{font-size:12.5px; color:var(--orange); font-weight:700;}
.filterhead{display:flex; justify-content:space-between; align-items:center; gap:10px; flex-wrap:wrap; margin-bottom:12px;}
.toggle{display:flex; gap:6px;}
.toggle button{ background:var(--ink-navy-2); color:var(--muted); border:1.5px solid var(--border); padding:6px 14px; font-size:12.5px; }
.toggle button.active{background:var(--cyan); color:var(--ink-navy); border-color:var(--cyan);}
.clearrow{display:flex; gap:10px; align-items:center; margin-top:12px; flex-wrap:wrap;}
.count{font-size:12px; color:var(--muted); white-space:nowrap;}
.clearbtn{background:var(--ink-navy-2); color:var(--muted); border:1.5px solid var(--border);}
.list{display:flex; flex-direction:column; gap:10px;}
.card{ background:var(--card-2); border:1px solid var(--border); border-radius:14px; padding:13px 14px; }
.card-top{display:flex; justify-content:space-between; align-items:flex-start; gap:10px; flex-wrap:wrap;}
.tags{display:flex; gap:6px; flex-wrap:wrap;}
.tag{ font-size:11.5px; font-weight:800; padding:3px 10px; border-radius:999px; }
.tag.stage{background:rgba(60,230,255,.15); color:var(--cyan); border:1px solid rgba(60,230,255,.4);}
.tag.rule覆い{background:rgba(255,63,127,.15); color:var(--pink); border:1px solid rgba(255,63,127,.4);}
.tag.rule{background:rgba(255,63,127,.15); color:var(--pink); border:1px solid rgba(255,63,127,.4);}
.card-actions{display:flex; gap:6px;}
.iconbtn{ background:transparent; border:1.5px solid var(--border); color:var(--muted); padding:4px 10px; font-size:12px; font-weight:700; border-radius:8px; }
.iconbtn:hover{color:var(--text); border-color:var(--cyan);}
.iconbtn.del:hover{color:var(--pink); border-color:var(--pink);}
.weapons{display:grid; grid-template-columns:repeat(2,1fr); gap:6px 14px; margin-top:10px;}
@media(min-width:560px){.weapons{grid-template-columns:repeat(4,1fr);}}
.wslot{font-size:13.5px;}
.wslot .num{color:var(--muted); font-size:11px; margin-right:4px;}
.memoline{margin-top:8px; font-size:12.5px; color:var(--muted); white-space:pre-wrap;}
.ts{font-size:10.5px; color:var(--muted); margin-top:8px;}
.matrixlegend{ display:flex; flex-wrap:wrap; gap:10px; margin-bottom:10px; font-size:11.5px; color:var(--muted); }
.matrixlegend span{display:flex; align-items:center; gap:5px;}
.legdot{width:9px; height:9px; border-radius:2px; display:inline-block;}
.tablewrap{overflow-x:auto; border:1px solid var(--border); border-radius:14px;}
table.matrix{border-collapse:collapse; width:100%; min-width:980px; font-size:12px; table-layout:fixed;}
table.matrix thead th{ background:var(--ink-navy-2); color:var(--cyan); text-align:center; padding:7px 4px; font-size:12px; font-weight:800; white-space:normal; line-height:1.2; word-break:keep-all; border-bottom:1.5px solid var(--border); border-left:1px solid var(--border); position:sticky; top:0; }
table.matrix thead th:first-child{ border-left:none; text-align:left; padding-left:10px; width:64px; color:var(--pink); }
table.matrix tbody th{ background:var(--ink-navy-2); color:var(--pink); text-align:left; padding:8px 8px; font-size:12.5px; font-weight:800; white-space:nowrap; border-top:1px solid var(--border); border-right:1.5px solid var(--border); }
table.matrix td{ border-top:1px solid var(--border); border-left:1px solid var(--border); padding:0; vertical-align:middle; width:114px; }
.cell{ display:grid; grid-template-columns:1fr 1fr; grid-template-rows:1fr 1fr; min-height:56px; cursor:pointer; }
.cell:hover{background:rgba(60,230,255,.06);}
.cell .q{ padding:4px 5px; font-size:10.5px; line-height:1.25; overflow:hidden; text-overflow:ellipsis; word-break:break-all; border-bottom:1px dashed rgba(154,154,192,.25); border-right:1px dashed rgba(154,154,192,.25); }
.cell .q:nth-child(2n){border-right:none;}
.cell .q:nth-child(n+3){border-bottom:none;}
.cell .q b{display:block; color:var(--muted); font-size:9px; font-weight:700; margin-bottom:1px;}
.cell.empty-cell{color:var(--border); text-align:center; display:flex; align-items:center; justify-content:center; font-size:16px;}
.matrixhint{font-size:11px; color:var(--muted); margin-top:10px;}
.empty{color:var(--muted); font-size:13.5px; text-align:center; padding:30px 10px;}
.loading{color:var(--muted); text-align:center; padding:20px; font-size:13px;}
</style>
</head>
<body>

<div id="lockScreen">
  <div style="font-size: 24px; font-weight: 900; margin-bottom: 20px; color: var(--lime);">🔒 合言葉を入力してね</div>
  <input type="text" id="passInput" placeholder="パスワード">
  <button id="loginBtn">解除する</button>
  <div id="lockMsg" style="color: var(--pink); font-size: 13px; margin-top: 10px; font-weight: 700;"></div>
</div>

<div class="wrap" id="mainContent" style="display:none;">
  <header>
    <div class="splat"></div>
    <h1>編成メモ</h1>
    <div class="sub">ステージ×ルールで4人の武器編成を記録・編集・検索</div>
  </header>
 
  <div class="panel" id="formPanel">
    <h2 id="formTitle">編成を記録する</h2>
    <div style="margin-bottom:12px;">
      <div style="font-size:11.5px;color:var(--muted);font-weight:800;margin-bottom:6px;">ステージ</div>
      <div class="chiprow" id="stageChips"></div>
    </div>
    <div style="margin-bottom:14px;">
      <div style="font-size:11.5px;color:var(--muted);font-weight:800;margin-bottom:6px;">ルール</div>
      <div class="chiprow" id="ruleChips"></div>
    </div>
    <div class="grid4" id="weaponInputs"></div>
    <div class="slot memo">
      <label>メモ（任意）</label>
      <input type="text" id="memoInput">
    </div>
    <div class="row-btns">
      <button class="btn-save" id="saveBtn">保存する</button>
      <button class="btn-cancel" id="cancelBtn" style="display:none;">編集をやめる</button>
      <span class="formmsg" id="formMsg"></span>
    </div>
  </div>
 
  <div class="panel">
    <div class="filterhead">
      <h2 style="margin:0;">記録を探す</h2>
      <div class="toggle">
        <button id="viewCardBtn" class="active">カード表示</button>
        <button id="viewTableBtn">一覧を見る</button>
      </div>
    </div>
    <div style="margin-bottom:10px;">
      <div class="chiprow" id="filterStageChips"></div>
    </div>
    <div style="margin-bottom:0;">
      <div class="chiprow" id="filterRuleChips"></div>
    </div>
    <div class="clearrow">
      <button class="clearbtn" id="clearFilterBtn">絞り込み解除</button>
      <span class="count" id="countLabel"></span>
    </div>
  </div>
 
  <div id="listArea">
    <div class="loading">読み込み中…</div>
  </div>
</div>
 
<script>
// 🔑 設定：4人で共有する「合言葉」をここに入力してください
const PASSWORD = "yb";

// ⚠️ Apps Scriptのデプロイで取得した「ウェブアプリのURL」をここに貼り付けてください
const API_URL = "https://script.google.com/macros/s/AKfycbyRJXLnMMa6LnHqZzIZlqaYMgWYi0oUs0I-3Hl8PZ_Hp7sy37R63wsUYBYkcxs57GVw/exec";
 
const STAGES = ["オヒョウ","チョウザメ","ナンプラー","カジキ","海女美","ヤガラ","マンタ","ザトウ"];
const RULES  = ["エリア","ホコ","ヤグラ","アサリ"];
const PLAYERS = ["らふらって","むうまる","ねる","ナガハン"];
 
let records = [];
let editingId = null;
let formStage = null; let formRule = null;
let filterStage = null; let filterRule = null;
let viewMode = "card";

// パスワード認証の処理
document.getElementById("loginBtn").onclick = function() {
  const input = document.getElementById("passInput").value;
  if (input === PASSWORD) {
    document.getElementById("lockScreen").style.display = "none";
    document.getElementById("mainContent").style.display = "block";
    loadAll(); // パスワードが合っていたらデータを読み込む
  } else {
    document.getElementById("lockMsg").textContent = "合言葉が違います！";
  }
};
// Enterキーでも解除できるようにする
document.getElementById("passInput").onkeydown = function(e) {
  if (e.key === "Enter") document.getElementById("loginBtn").click();
};
 
function uid(){ return Date.now().toString(36) + Math.random().toString(36).slice(2,7); }
 
async function persist(){
  if(!API_URL || API_URL.includes("ここに")){
    localStorage.setItem("compositions_backup", JSON.stringify(records));
    return;
  }
  document.getElementById("formMsg").textContent = "通信中...";
  try{
    await fetch(API_URL, { method: "POST", body: JSON.stringify(records) });
    document.getElementById("formMsg").textContent = "同期完了！";
  }catch(e){
    console.error(e);
    document.getElementById("formMsg").textContent = "保存に失敗しました";
  }
}
 
async function loadAll(){
  const area = document.getElementById("listArea");
  if(!API_URL || API_URL.includes("ここに")){
    records = JSON.parse(localStorage.getItem("compositions_backup") || "[]");
    renderList();
    return;
  }
  try{
    const res = await fetch(API_URL);
    records = await res.json();
  }catch(e){
    console.error(e);
    area.innerHTML = '<div class="empty">データの取得に失敗しました。</div>';
    return;
  }
  renderList();
}
 
function buildChips(container, items, getActive, onClick, activeClass){
  container.innerHTML = "";
  items.forEach(item=>{
    const c = document.createElement("div");
    c.className = "chip" + (getActive()===item ? " active" + (activeClass?(" "+activeClass):"") : "");
    c.textContent = item;
    c.onclick = ()=> onClick(item);
    container.appendChild(c);
  });
}
 
function renderFormChips(){
  buildChips(document.getElementById("stageChips"), STAGES, ()=>formStage, (s)=>{
    formStage = (formStage===s)? null : s; renderFormChips();
  });
  buildChips(document.getElementById("ruleChips"), RULES, ()=>formRule, (r)=>{
    formRule = (formRule===r)? null : r; renderFormChips();
  }, "rule-active");
}
 
function renderFilterChips(){
  buildChips(document.getElementById("filterStageChips"), STAGES, ()=>filterStage, (s)=>{
    filterStage = (filterStage===s)? null : s; renderFilterChips(); renderList();
  });
  buildChips(document.getElementById("filterRuleChips"), RULES, ()=>filterRule, (r)=>{
    filterRule = (filterRule===r)? null : r; renderFilterChips(); renderList();
  }, "rule-active");
}
 
function buildWeaponInputs(){
  const wrap = document.getElementById("weaponInputs");
  wrap.innerHTML = "";
  PLAYERS.forEach((name,i)=>{
    const slot = document.createElement("div");
    slot.className = "slot";
    slot.innerHTML = `<label>${name}</label><input type="text" id="wpn${i}">`;
    wrap.appendChild(slot);
  });
}
 
function resetForm(){
  editingId = null; formStage = null; formRule = null;
  document.getElementById("formTitle").textContent = "編成を記録する";
  document.getElementById("cancelBtn").style.display = "none";
  document.getElementById("saveBtn").textContent = "保存する";
  document.getElementById("memoInput").value = "";
  for(let i=0;i<4;i++) document.getElementById("wpn"+i).value = "";
  document.getElementById("formMsg").textContent = "";
  renderFormChips();
}
 
function loadIntoForm(rec){
  editingId = rec.id; formStage = rec.stage; formRule = rec.rule;
  document.getElementById("formTitle").textContent = "編成を編集する";
  document.getElementById("cancelBtn").style.display = "inline-block";
  document.getElementById("saveBtn").textContent = "更新する";
  document.getElementById("memoInput").value = rec.memo || "";
  for(let i=0;i<4;i++) document.getElementById("wpn"+i).value = rec.weapons[i] || "";
  document.getElementById("formMsg").textContent = "";
  renderFormChips();
  document.getElementById("formPanel").scrollIntoView({behavior:"smooth", block:"start"});
}
 
async function saveRecord(){
  const msg = document.getElementById("formMsg");
  if(!formStage || !formRule){ msg.textContent = "ステージとルールを選んでください"; return; }
  const weapons = [0,1,2,3].map(i=>document.getElementById("wpn"+i).value.trim());
  if(weapons.every(w=>!w)){ msg.textContent = "武器を最低1つ入力してください"; return; }
  const memo = document.getElementById("memoInput").value.trim();
 
  if(editingId){
    const rec = records.find(r=>r.id===editingId);
    if(rec){
      rec.stage = formStage; rec.rule = formRule; rec.weapons = weapons; rec.memo = memo;
      rec.updatedAt = Date.now();
    }
  } else {
    records.unshift({
      id: uid(), stage: formStage, rule: formRule, weapons, memo,
      createdAt: Date.now(), updatedAt: Date.now()
    });
  }
  renderList();
  await persist();
  resetForm();
}
 
async function deleteRecord(id){
  if(!confirm("この編成メモを削除しますか？")) return;
  records = records.filter(r=>r.id!==id);
  renderList();
  await persist();
}
 
function fmtDate(ts){
  const d = new Date(ts);
  return `${d.getFullYear()}/${d.getMonth()+1}/${d.getDate()} ${String(d.getHours()).padStart(2,"0")}:${String(d.getMinutes()).padStart(2,"0")}`;
}
 
function getFiltered(){
  return records.filter(r=>{
    if(filterStage && r.stage!==filterStage) return false;
    if(filterRule && r.rule!==filterRule) return false;
    return true;
  });
}
 
function renderList(){
  const area = document.getElementById("listArea");
  const filtered = getFiltered();
  document.getElementById("countLabel").textContent = `${filtered.length}件 / 全${records.length}件`;
  area.innerHTML = "";
 
  if(viewMode==="table"){ area.appendChild(renderMatrix()); return; }
  if(filtered.length===0){
    area.innerHTML = `<div class="empty">${records.length===0 ? "まだ記録がありません。" : "条件に一致する記録がありません。"}</div>`;
    return;
  }
  area.appendChild(renderCards(filtered));
}
 
function renderCards(filtered){
  const list = document.createElement("div");
  list.className = "list";
  filtered.forEach(r=>{
    const card = document.createElement("div");
    card.className = "card";
    card.innerHTML = `
      <div class="card-top">
        <div class="tags"><span class="tag stage">${r.stage}</span><span class="tag rule">${r.rule}</span></div>
        <div class="card-actions"><button class="iconbtn edit">編集</button><button class="iconbtn del">削除</button></div>
      </div>
      <div class="weapons">
        ${r.weapons.map((w,i)=>`<div class="wslot"><span class="num">${PLAYERS[i]}</span>${w? w : "―"}</div>`).join("")}
      </div>
      ${r.memo ? `<div class="memoline">${r.memo.replace(/</g,"&lt;")}</div>` : ""}
      <div class="ts">${fmtDate(r.updatedAt||r.createdAt)}</div>
    `;
    card.querySelector(".edit").onclick = ()=> loadIntoForm(r);
    card.querySelector(".del").onclick = ()=> deleteRecord(r.id);
    list.appendChild(card);
  });
  return list;
}
 
function renderMatrix(){
  const holder = document.createElement("div");
  const cols = filterStage ? [filterStage] : STAGES;
  const rows = filterRule ? [filterRule] : RULES;
  const legend = document.createElement("div");
  legend.className = "matrixlegend";
  legend.innerHTML = PLAYERS.map(p=>`<span><span class="legdot" style="background:var(--lime)"></span>${p}</span>`).join("") + `<span>マスをクリックで編集・追加</span>`;
  holder.appendChild(legend);
 
  const wrap = document.createElement("div");
  wrap.className = "tablewrap";
  const table = document.createElement("table");
  table.className = "matrix";
  const thead = document.createElement("thead");
  const headRow = document.createElement("tr");
  headRow.innerHTML = `<th></th>` + cols.map(s=>`<th>${s}</th>`).join("");
  thead.appendChild(headRow);
  table.appendChild(thead);
 
  const tbody = document.createElement("tbody");
  rows.forEach(rule=>{
    const tr = document.createElement("tr");
    const rowHeadTh = document.createElement("th");
    rowHeadTh.textContent = rule;
    tr.appendChild(rowHeadTh);
 
    cols.forEach(stage=>{
      const td = document.createElement("td");
      const matches = records.filter(r=>r.stage===stage && r.rule===rule).sort((a,b)=>(b.updatedAt||b.createdAt)-(a.updatedAt||a.createdAt));
      const rec = matches[0];
 
      if(!rec){
        const cell = document.createElement("div"); cell.className = "cell empty-cell"; cell.textContent = "+";
        cell.onclick = ()=>{
          formStage = stage; formRule = rule; editingId = null;
          document.getElementById("formTitle").textContent = "編成を記録する";
          document.getElementById("cancelBtn").style.display = "none"; document.getElementById("saveBtn").textContent = "保存する";
          renderFormChips(); document.getElementById("formPanel").scrollIntoView({behavior:"smooth", block:"start"});
        };
        td.appendChild(cell);
      } else {
        const cell = document.createElement("div"); cell.className = "cell";
        cell.innerHTML = PLAYERS.map((p,i)=>`<div class="q"><b>${p}${matches.length>1 && i===0 ? " ・他"+(matches.length-1) : ""}</b>${rec.weapons[i]? rec.weapons[i] : "―"}</div>`).join("");
        cell.onclick = ()=> loadIntoForm(rec);
        td.appendChild(cell);
      }
      tr.appendChild(td);
    });
    tbody.appendChild(tr);
  });
  table.appendChild(tbody); wrap.appendChild(table); holder.appendChild(wrap);
  return holder;
}
 
document.getElementById("saveBtn").onclick = saveRecord;
document.getElementById("cancelBtn").onclick = resetForm;
document.getElementById("clearFilterBtn").onclick = ()=>{ filterStage = null; filterRule = null; renderFilterChips(); renderList(); };
document.getElementById("viewCardBtn").onclick = ()=>{ viewMode = "card"; document.getElementById("viewCardBtn").classList.add("active"); document.getElementById("viewTableBtn").classList.remove("active"); renderList(); };
document.getElementById("viewTableBtn").onclick = ()=>{ viewMode = "table"; document.getElementById("viewTableBtn").classList.add("active"); document.getElementById("viewCardBtn").classList.remove("active"); renderList(); };
 
buildWeaponInputs(); renderFormChips(); renderFilterChips();
</script>
</body>
</html>
